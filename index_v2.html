<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SRS 系統 - iPas特訓版 (V2)</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style_v2.css">
</head>
<body class="light-theme">
    <div id="app" class="app-container">
        <!-- Sidebar Menu (依據 iPas 大綱結構) -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h3><i class="fas fa-brain"></i> iPas 學習導航</h3>
            </div>
            <nav id="courseNav" class="nav-container">
                <!-- 動態生成的嵌套目錄 -->
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-workspace">
            <!-- Header Controls -->
            <header class="glass-panel main-header">
                <div class="header-info">
                    <h2 id="currentTopicTitle">請選擇左側單元開始學習</h2>
                </div>
                <div class="header-controls">
                    <!-- TTS 語音朗讀區塊 -->
                    <div class="tts-engine-panel">
                        <i class="fas fa-volume-up icon-accent"></i>
                        <select id="ttsEngineSelect" class="tts-engine-select">
                            <option value="browser">系統語音</option>
                        </select>
                    </div>
                    <button id="srsToggle" class="control-btn" title="切換測驗模式"><i class="fas fa-dumbbell"></i> 實戰測驗</button>
                    <button id="toggleTheme" class="control-btn icon-btn" title="切換主題">🌓</button>
                </div>
            </header>

            <!-- Mindmap Canvas Area -->
            <section class="content-area" id="panzoomArea">
                <div id="mindmapCanvas" class="mindmap-canvas">
                    <!-- 點擊展開的心智圖學習卡會動態生成於此 -->
                    <svg id="mindmapLines" class="mindmap-lines"></svg>
                </div>
            </section>
        </main>
    </div>

    <!-- 既有依賴檔案 (暫時借用舊版資料) -->
    <script src="data.js"></script>
    <script src="quizzes.js"></script>
    <script src="app_v2.js"></script>
</body>
</html>
