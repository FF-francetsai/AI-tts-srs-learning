<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SRS 智慧學習平台 V3</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style_v3.css">
</head>
<body class="light-theme">
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>AI SRS 智慧學習平台 V3</span>
            </div>
            <div class="header-controls">
                <div class="tts-engine-panel">
                    <i class="fas fa-volume-up" style="color:var(--accent-color); font-size:0.9rem;"></i>
                    <span class="tts-label">發音引擎</span>
                    <select id="ttsEngineSelect" class="tts-engine-select" title="選擇 TTS 引擎">
                        <option value="browser">💻 瀏覽器系統</option>
                        <option value="google">🌐 Google 真人</option>
                        <option value="azure">☁️ Azure 真人</option>
                        <option value="openai">🤖 OpenAI 真人</option>
                    </select>
                    <span class="tts-divider"></span>
                    <i class="fas fa-user" style="color:var(--text-dim); font-size:0.8rem;"></i>
                    <select id="ttsGenderSelect" class="tts-engine-select" title="選擇性別聲線（男/女）">
                        <option value="female">♀ 女聲</option>
                        <option value="male">♂ 男聲</option>
                    </select>
                    <span class="tts-divider"></span>
                    <i class="fas fa-tachometer-alt" style="color:var(--text-dim); font-size:0.8rem;" title="語速"></i>
                    <input type="range" id="ttsRateSlider" class="tts-rate-slider" min="0.5" max="1.5" step="0.1" value="0.5" title="語速調控">
                    <span id="ttsRateLabel" class="tts-rate-label">0.5x</span>
                    <span class="tts-divider"></span>
                    <i class="fas fa-music" style="color:var(--text-dim); font-size:0.8rem;" title="語調"></i>
                    <input type="range" id="ttsPitchSlider" class="tts-rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" title="語調調控">
                    <span id="ttsPitchLabel" class="tts-rate-label">1.0x</span>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="topicSearch" placeholder="搜尋術語或單元...">
                </div>
                <div class="btn-with-label">
                    <span class="ctrl-label">複習模式</span>
                    <button id="srsToggle" class="control-btn" title="開啟後只顯示今日待複習的學習卡">
                        <i class="fas fa-graduation-cap"></i>
                        <span class="btn-text">每日複習</span>
                    </button>
                </div>
                <button id="toggleTheme" class="control-btn" title="切換深色 / 淺色主題">🌓</button>
                <div class="btn-with-label">
                    <span class="ctrl-label">字體大小</span>
                    <div class="font-controls">
                        <button id="fontDown" class="control-btn" title="縮小字體">A-</button>
                        <button id="fontUp" class="control-btn" title="放大字體">A+</button>
                    </div>
                </div>
                <button id="openRightPanelBtn" class="control-btn mobile-hide-btn" title="展開知識神經網" style="display: none;">
                    <i class="fas fa-network-wired"></i>
                </button>
                <!-- Hamburger menu for mobile -->
                <button id="menuToggle" class="control-btn mobile-only" title="選單">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <main class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h3><i class="fas fa-brain"></i> iPas 學習導航</h3>
                    <div id="progressIndicator" class="progress-mini">
                        <span id="progressText">進度: 0%</span>
                        <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill"></div></div>
                    </div>
                </div>
                <nav id="sidebarNav" class="nav-container"></nav>
            </aside>

            <!-- Content Area (Middle) -->
            <section class="content-area">
                <div id="topicContent" class="topic-container" style="position: relative; z-index: 10;">
                    <!-- Static Header and Flashcard will be injected here -->
                </div>
                
                <!-- Quiz Area (Hidden by default) -->
                <div id="quizContainer" class="quiz-container glass-panel hidden">
                    <div class="quiz-header">
                        <span class="quiz-badge">Challenge</span>
                        <h3 id="quizQuestion">題目載入中...</h3>
                    </div>
                    <div id="quizOptions" class="quiz-options"></div>
                    <div id="quizFeedback" class="quiz-feedback hidden">
                        <div id="quizExplain" class="quiz-explain"></div>
                        <div class="srs-actions">
                            <p class="srs-prompt">這題對您來說難度如何？</p>
                            <div class="srs-btns">
                                <button class="srs-btn again" data-grade="0">Again (1d)</button>
                                <button class="srs-btn hard" data-grade="1">Hard (2d)</button>
                                <button class="srs-btn good" data-grade="2">Good (4d)</button>
                                <button class="srs-btn easy" data-grade="3">Easy (7d)</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Panel (Infinite Mindmap) -->
            <aside class="right-panel glass-panel">
                <div class="right-panel-header">
                    <h3><i class="fas fa-network-wired"></i> 知識神經網</h3>
                    <button id="toggleRightPanelBtn" class="control-btn mobile-hide-btn" title="隱藏或展開"><i class="fas fa-compress-arrows-alt"></i></button>
                </div>
                <div id="panzoomArea" class="hidden panzoom-area">
                    <div id="mindmapCanvas" class="mindmap-canvas">
                        <svg id="mindmapLines" class="mindmap-lines"></svg>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer class="glass-panel main-footer">
            <div class="footer-info">
                <span>Power by AntiGravity &amp; SRS Memory System</span>
            </div>
            <div class="tts-voice-hint" style="font-size:0.75rem; color:var(--text-dim);">
                <i class="fas fa-info-circle"></i> 點擊學習卡上的喇叭圖示以指定引擎發音
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="quizzes.js"></script>
    <script src="app_v3.js"></script>
</body>
</html>
