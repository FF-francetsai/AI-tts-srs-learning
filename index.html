<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPas AI 應用規畫師 AI SRS 智慧學習平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    
    <link rel="stylesheet" href="style.css?v=4.4">
</head>

<body class="light-theme">
    <div id="app" class="app-container">
        <header class="glass-panel main-header">
            <div class="header-top">
                <button id="menuBtn" class="icon-btn menu-toggle" title="切換導航選單">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>iPas AI 應用規畫師 AI SRS 智慧學習平台</span>
                </div>
                <div class="header-quick-actions">
                    <button id="toggleControlsBtn" class="control-btn menu-toggle" title="展開設定" style="display: none;">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button id="toggleTheme" class="control-btn" title="切換深色 / 淺色主題">🌓</button>
                    <button class="icon-btn highlight" id="syncCloudBtn" title="同步雲端最新數據 (Google Sheets)"
                        onclick="App.syncFromCloud()">
                        <i class="fas fa-rotate" id="syncBtn"></i>
                    </button>
                </div>
            </div>

            <div class="header-controls" id="headerControls">
                <div class="tts-engine-panel">
                    <div class="control-row">
                        <i class="fas fa-volume-up" style="color:var(--accent-color); font-size:0.9rem;"></i>
                        <span class="tts-label">發音引擎</span>
                        <select id="ttsEngineSelect" class="tts-engine-select" title="選擇 TTS 引擎">
                            <option value="browser">💻 系統預設</option>
                            <option value="google" selected>🌐 Google 真人</option>
                        </select>
                        <span class="tts-divider"></span>
                        <i class="fas fa-user" style="color:var(--text-dim); font-size:0.8rem;"></i>
                        <select id="ttsGenderSelect" class="tts-engine-select" title="選擇性別聲線">
                            <option value="female" selected>♀ 女聲</option>
                            <option value="male">♂ 男聲</option>
                        </select>
                    </div>

                    <div class="control-row sliders">
                        <div class="slider-group">
                            <span class="ctrl-label">語速</span>
                            <div class="slider-container">
                                <input type="range" id="ttsRateSlider" min="0.1" max="2.0" step="0.1" value="0.5">
                                <span class="slider-val" id="ttsRateVal">0.5</span>
                            </div>
                        </div>
                        <div id="pitchControlGroup" class="slider-group">
                            <span class="ctrl-label">音調 <small>(系統)</small></span>
                            <div class="slider-container">
                                <input type="range" id="ttsPitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
                                <span class="slider-val" id="ttsPitchVal">1.0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="topicSearch" placeholder="搜尋術語、關鍵字...">
                </div>

                <div class="mode-controls">
                     <button id="srsToggle" class="control-btn" title="每日複習模式">
                        <i class="fas fa-graduation-cap"></i>
                        <span class="btn-text">每日複習</span>
                    </button>
                    <button id="headerWrongQuizBtn" class="control-btn secondary" title="錯題補救測驗">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span class="btn-text">錯題補救</span>
                    </button>
                    <div class="font-controls">
                        <button id="fontDown" class="control-btn">A-</button>
                        <button id="fontUp" class="control-btn">A+</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-layout">
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h3><i class="fas fa-brain"></i> iPas 學習導航</h3>
                    <div id="progressIndicator" class="progress-mini">
                        <span id="progressText">進度: 0%</span>
                        <div class="progress-bar-bg">
                            <div id="progressBar" class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
                <nav id="sidebarNav" class="nav-container"></nav>
            </aside>

            <section class="content-area">
                <div id="topicContent" class="topic-container">
                    </div>

                <div id="quizContainer" class="quiz-container glass-panel hidden">
                    <div class="quiz-header">
                        <span class="quiz-badge">Challenge</span>
                        <h3 id="quizQuestion">題目載入中...</h3>
                    </div>
                    <div id="quizOptions" class="quiz-options"></div>
                    <div id="quizFeedback" class="quiz-feedback hidden">
                        <div id="quizExplain" class="quiz-explain"></div>
                        <button id="nextQuestionBtn" class="control-btn next-btn hidden"
                            style="margin: 20px auto; display: block; background: var(--accent-color); color: white;">下一題
                            <i class="fas fa-arrow-right"></i></button>
                        <div id="srsActions" class="srs-actions hidden">
                            <p class="srs-prompt">這題對您來說難度如何？</p>
                            <div class="srs-btns">
                                <button class="srs-btn again" data-grade="0">Again (1d)</button>
                                <button class="srs-btn hard" data-grade="1">Hard (2d)</button>
                                <button class="srs-btn good" data-grade="2">Good (4d)</button>
                                <button class="srs-btn easy" data-grade="3">Easy (7d)</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="glass-panel main-footer">
            <div class="footer-info">
                <span>Power by AntiGravity &amp; SRS Memory System</span>
            </div>
            <div class="tts-voice-hint" style="font-size:0.75rem; color:var(--text-dim);">
                <i class="fas fa-info-circle"></i> 點擊學習卡上的喇叭圖示以指定引擎發音
            </div>
        </footer>
    </div>

    <script src="data.js?v=4.5"></script>
    <script src="quizzes.js?v=4.5"></script>
    <script src="app.js?v=4.5"></script>
</body>

</html>
